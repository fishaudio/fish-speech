services:
  app-base:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        BACKEND: ${BACKEND:-cuda}     # or cpu
        UV_VERSION: ${UV_VERSION:-0.8.15}
    volumes:
      - ./checkpoints:/app/checkpoints
      - ./references:/app/references
    environment:
      COMPILE: ${COMPILE:-0}
      FISH_MODEL_TYPE: ${FISH_MODEL_TYPE:-s2}
      LLAMA_CHECKPOINT_PATH: ${LLAMA_CHECKPOINT_PATH:-}
      DECODER_CHECKPOINT_PATH: ${DECODER_CHECKPOINT_PATH:-}
      DECODER_CONFIG_NAME: ${DECODER_CONFIG_NAME:-modded_dac_vq}
    # GPU (remove this block if CPU-only):
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    tty: true
    stdin_open: true
